<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin Dashboard | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#1678c3', dark: '#0b1120', panel: '#1e293b', accent: '#079c20' }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-dark text-slate-300 font-sans antialiased pb-20">
    
    <!-- Top Header -->
    <header class="fixed top-0 w-full glass-panel z-50 px-4 py-3 flex justify-between items-center shadow-lg border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-brand flex items-center justify-center text-white font-bold">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold text-white leading-tight">Master Admin</h1>
                <p class="text-xs text-slate-400">Online</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button class="text-slate-400 hover:text-white relative">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center font-bold">3</span>
            </button>
            <button class="text-slate-400 hover:text-white"><i class="fa-solid fa-bars text-xl"></i></button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 px-4">
        <!-- Overview Stats -->
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Platform Overview</h2>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass-panel p-4 rounded-xl">
                <div class="text-slate-400 text-xs mb-1"><i class="fa-solid fa-users text-brand mr-1"></i> Total Users</div>
                <div class="text-xl font-bold text-white">24,592</div>
                <div class="text-xs text-accent mt-1"><i class="fa-solid fa-arrow-trend-up"></i> +12% this week</div>
            </div>
            <div class="glass-panel p-4 rounded-xl">
                <div class="text-slate-400 text-xs mb-1"><i class="fa-solid fa-network-wired text-brand mr-1"></i> Active Agents</div>
                <div class="text-xl font-bold text-white">148</div>
                <div class="text-xs text-accent mt-1"><i class="fa-solid fa-arrow-trend-up"></i> +3 new</div>
            </div>
            <div class="glass-panel p-4 rounded-xl col-span-2 flex justify-between items-center">
                <div>
                    <div class="text-slate-400 text-xs mb-1"><i class="fa-solid fa-sack-dollar text-brand mr-1"></i> Total GGR (Revenue)</div>
                    <div class="text-2xl font-bold text-accent">€ 1,245,890.00</div>
                </div>
                <div class="h-10 w-10 rounded-full bg-accent/20 flex items-center justify-center text-accent">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Quick Actions</h2>
        <div class="grid grid-cols-4 gap-2 mb-6">
            <button class="flex flex-col items-center justify-center glass-panel p-3 rounded-xl hover:bg-panel transition">
                <i class="fa-solid fa-user-plus text-brand text-xl mb-2"></i>
                <span class="text-[10px]">New Agent</span>
            </button>
            <button class="flex flex-col items-center justify-center glass-panel p-3 rounded-xl hover:bg-panel transition">
                <i class="fa-solid fa-gift text-brand text-xl mb-2"></i>
                <span class="text-[10px]">Bonuses</span>
            </button>
            <button class="flex flex-col items-center justify-center glass-panel p-3 rounded-xl hover:bg-panel transition">
                <i class="fa-solid fa-gears text-brand text-xl mb-2"></i>
                <span class="text-[10px]">Settings</span>
            </button>
            <button class="flex flex-col items-center justify-center glass-panel p-3 rounded-xl hover:bg-panel transition">
                <i class="fa-solid fa-file-invoice text-brand text-xl mb-2"></i>
                <span class="text-[10px]">Reports</span>
            </button>
        </div>

        <!-- Recent Activity -->
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">System Alerts</h2>
        <div class="glass-panel rounded-xl overflow-hidden">
            <div class="p-3 border-b border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-red-500/20 text-red-500 flex items-center justify-center"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div>
                        <div class="text-sm text-white">Large Withdrawal Request</div>
                        <div class="text-xs text-slate-400">Agent: Master01 - €50,000</div>
                    </div>
                </div>
                <button class="text-xs bg-brand text-white px-3 py-1 rounded">Review</button>
            </div>
            <div class="p-3 border-b border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-accent/20 text-accent flex items-center justify-center"><i class="fa-solid fa-user-check"></i></div>
                    <div>
                        <div class="text-sm text-white">New Agent Registered</div>
                        <div class="text-xs text-slate-400">Sub-agent: VIP_Tunis</div>
                    </div>
                </div>
                <button class="text-xs border border-slate-600 text-slate-300 px-3 py-1 rounded">View</button>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full glass-panel border-t border-slate-800 flex justify-around items-center px-2 py-3 z-50">
        <a href="/admin" class="flex flex-col items-center text-brand">
            <i class="fa-solid fa-house mb-1"></i>
            <span class="text-[10px]">Dashboard</span>
        </a>
        <a href="#" class="flex flex-col items-center text-slate-500 hover:text-slate-300">
            <i class="fa-solid fa-users-gear mb-1"></i>
            <span class="text-[10px]">Agents</span>
        </a>
        <a href="#" class="flex flex-col items-center text-slate-500 hover:text-slate-300">
            <i class="fa-solid fa-chart-pie mb-1"></i>
            <span class="text-[10px]">Stats</span>
        </a>
        <a href="#" class="flex flex-col items-center text-slate-500 hover:text-slate-300">
            <i class="fa-solid fa-gear mb-1"></i>
            <span class="text-[10px]">System</span>
        </a>
    </nav>
</body>
</html>
