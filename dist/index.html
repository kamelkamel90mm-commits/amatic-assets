.tw-grid .ui-block { background: #1678c3 !important; width: 100% !important; height: 0 !important; padding-bottom: 100% !important; position: relative !important; border-bottom: 1px solid #0e63ae !important; border-right: 1px solid #0e63ae !important; box-sizing: border-box !important; overflow: hidden !important; }

.tw-grid .ui-block .lbl { position: absolute !important; bottom: 6px !important; left: 8px !important; font-size: 12px !important; color: #fff !important; font-weight: 300 !important; line-height: 1.2 !important; }
.tw-grid .categoryIconContainer { width: 70% !important; height: 50% !important; position: absolute !important; top: 18% !important; left: 15% !important; }

/* Footer navbar - 4 columns (logged out), 5 columns (logged in) */

#main_navbar a:last-child { border-right: none !important; }
#main_navbar a.ui-btn-active { background-image: none !important; background-color: #2a6fb6 !important; }

#main_navbar .footer-icon { position: absolute !important; top: 6px !important; left: 50% !important; margin-left: -12px !important; width: 24px !important; height: 24px !important; background-size: contain !important; background-position: center !important; background-repeat: no-repeat !important; }

/* Speech badges (count + stake) */
#main_navbar span.speech, #main_navbar span.speechAcc { background-color: #079c20 !important; border-radius: 4px !important; color: white !important; font-size: 11px !important; font-weight: 600 !important; padding: 3px 6px !important; position: absolute !important; top: -10px !important; right: 2px !important; z-index: 999 !important; }
#bsMaxQuota { background-color: #1678c3 !important; font-size: 11px !important; left: -6px !important; padding: 4px 2px !important; width: 32px !important; }

<script>
// Switch footer to 5 columns when logged in
(function(){
  try {
    const s = JSON.parse(localStorage.getItem('forzza_session') || 'null');
    if (s && s.userId) {
      const nav = document.getElementById('main_navbar');
      if (nav) {
        nav.classList.remove('logged-out');
        nav.classList.add('logged-in');
        // Insert Account cell after Home
        const homeBlk = nav.children[0];
        const acc = document.createElement('div');
        acc.className = 'ui-block';
        acc.innerHTML = '<a href="account.html"><div class="footer-icon tw-account"></div>Account</a>';
        homeBlk.insertAdjacentElement('afterend', acc);
      }
    }
  } catch(e){}
})();
</script>
