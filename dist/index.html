<div data-role="page" data-theme="a" id="mobileStart_aspx" class="ui-page ui-page-active">

      <li class="normal"><a href="sports.html" class="ui-btn"><div class="categoryIconContainer tw-sport-1000004"></div><h2>Sports betting</h2></a></li>
      <li class="normal"><a href="live.html" class="ui-btn"><div class="categoryIconContainer tw-sport-1000000"></div><h2>Live betting</h2></a></li>

  <!-- Footer (4 cols logged out, 5 cols logged in) -->

    <div id="main_navbar" data-role="navbar" class="logged-out">
      <div class="ui-block"><a href="index.html" id="homeLink" class="ui-btn ui-btn-active"><span class="ui-btn-icon-top ui-btn-icon-top-home"></span>Home</a></div>
      <div class="ui-block"><a href="login.html" id="loginLink"><span class="ui-btn-icon-top ui-btn-icon-top-login"></span>Login</a></div>

      <div class="ui-block"><a href="#" id="betslipLink"><span class="speech" id="fbsCounter">0</span><span class="ui-btn-icon-top ui-btn-icon-top-betslip"></span>Bet slip</a></div>
    </div>
  </div>
</div>
<script>
// If user is logged in, change footer to 5 columns and mark Home active differently
(function(){
  try {
    const s = JSON.parse(localStorage.getItem('forzza_session') || 'null');
    const nav = document.getElementById('main_navbar');
    if (s && s.userId && nav) {
      nav.classList.remove('logged-out');
      nav.classList.add('logged-in');
      // Insert Account cell after Home (column 2)
      const homeBlk = nav.children[0];
      const acc = document.createElement('div');
      acc.className = 'ui-block';
      acc.innerHTML = '<a href="account.html" id="accountLink"><span class="speech speechAcc" id="acc-balance">0.00</span><span class="ui-btn-icon-top ui-btn-icon-top-account"></span>Account</a>';
      homeBlk.insertAdjacentElement('afterend', acc);
      // Update balance badge if available
      const bal = document.getElementById('acc-balance');
      if (bal && s.balance != null) bal.textContent = Number(s.balance).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
  } catch(e){}
})();
</script>
