<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forzza Crash Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        #multiplier { font-size: 80px; font-weight: bold; color: #1678c3; transition: color 0.2s; margin-top: 20px;}
        #controls { margin-top: 30px; }
        button { background: #079c20; color: #fff; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; cursor: not-allowed; }
        #cashoutBtn { background: #f59e0b; display: none; }
        #message { font-size: 18px; margin-top: 20px; height: 25px; color: #ef4444; }
        #balance-display { font-size: 20px; position: absolute; top: 20px; right: 20px; color: #eab308; font-weight: bold; }
        #bet-input { padding: 10px; font-size: 18px; width: 100px; text-align: center; border-radius: 5px; border: none; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="balance-display">€ <span id="bal">...</span></div>
    
    <div style="font-size:24px; color:#888;">FORZZA CRASH</div>
    <div id="multiplier">1.00x</div>
    
    <div id="controls">
        <input type="number" id="bet-input" value="10" min="1" step="1">
        <button id="betBtn">BET</button>
        <button id="cashoutBtn">CASHOUT</button>
    </div>
    
    <div id="message"></div>

    <script>
        const supabaseUrl = 'https://ynsjeihnqixqvkyzzpsz.supabase.co';
        const supabaseKey = 'sb_publishable_fmL7mrm1-LV4jFtqRa_SZw_mqaip_X8';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let user = null;
        let balance = 0;
        let currentBet = 0;
        let isPlaying = false;
        let multiplier = 1.00;
        let crashPoint = 1.00;
        let timer = null;

        async function init() {
            const { data } = await supabase.auth.getSession();
            if(!data.session) {
                document.getElementById('message').innerText = "Please Login to Play!";
                return;
            }
            user = data.session.user;
            await fetchBalance();
        }

        async function fetchBalance() {
            if(!user) return;
            const { data, error } = await supabase.from('profiles').select('balance').eq('id', user.id).single();
            if(data) {
                balance = data.balance;
                document.getElementById('bal').innerText = balance.toFixed(2);
            }
        }

        async function updateBalance(amount, type) {
            const newBal = balance + amount;
            await supabase.from('profiles').update({ balance: newBal }).eq('id', user.id);
            await fetchBalance();
        }

        document.getElementById('betBtn').addEventListener('click', async () => {
            if(!user) { alert('Please login first!'); return; }
            const betAmt = parseFloat(document.getElementById('bet-input').value);
            if(betAmt > balance) {
                document.getElementById('message').innerText = "Insufficient Balance!";
                return;
            }
            
            // Deduct bet
            document.getElementById('message').innerText = "Bet placed! Good luck.";
            document.getElementById('betBtn').disabled = true;
            document.getElementById('bet-input').disabled = true;
            await updateBalance(-betAmt, 'bet');
            currentBet = betAmt;
            
            startGame();
        });

        document.getElementById('cashoutBtn').addEventListener('click', async () => {
            if(!isPlaying) return;
            isPlaying = false;
            clearInterval(timer);
            
            const winAmount = currentBet * multiplier;
            document.getElementById('message').innerText = `You won €${winAmount.toFixed(2)}!`;
            document.getElementById('message').style.color = '#10b981';
            document.getElementById('multiplier').style.color = '#10b981';
            
            await updateBalance(winAmount, 'win');
            
            resetGame();
        });

        function startGame() {
            isPlaying = true;
            multiplier = 1.00;
            // Math magic for crash point
            crashPoint = Math.max(1.00, (0.99 / Math.random()));
            if(crashPoint > 10) crashPoint = (Math.random() * 5) + 1; 
            
            document.getElementById('betBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'inline-block';
            document.getElementById('multiplier').style.color = '#1678c3';
            
            timer = setInterval(() => {
                multiplier += 0.01 * (multiplier * 0.1 + 1);
                
                if(multiplier >= crashPoint) {
                    crash();
                } else {
                    document.getElementById('multiplier').innerText = multiplier.toFixed(2) + 'x';
                }
            }, 50);
        }

        function crash() {
            isPlaying = false;
            clearInterval(timer);
            document.getElementById('multiplier').innerText = "CRASHED @ " + crashPoint.toFixed(2) + "x";
            document.getElementById('multiplier').style.color = '#ef4444';
            document.getElementById('message').innerText = "You crashed!";
            document.getElementById('message').style.color = '#ef4444';
            resetGame();
        }

        function resetGame() {
            document.getElementById('cashoutBtn').style.display = 'none';
            document.getElementById('betBtn').style.display = 'inline-block';
            document.getElementById('betBtn').disabled = false;
            document.getElementById('bet-input').disabled = false;
            currentBet = 0;
        }

        init();
    </script>
</body>
</html>
