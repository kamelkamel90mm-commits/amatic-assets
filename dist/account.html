<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Account Settings - Forzza</title>
<link rel="stylesheet" type="text/css" href="static-content/styles-master/d8dcf95cacfe42e58a17c44c3d4953cf/"/>
<link rel="stylesheet" type="text/css" href="static-content/styles-custom/afad3c25f58b4bb1ac7366c519569fec/"/>
<style>
body { background:#084772; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0; }
header { background:#000; color:#fff; padding:12px 16px; display:flex; align-items:center; }
header h1 { font-size:18px; margin:0; flex:1; }
header a { color:#fff; text-decoration:none; font-size:14px; padding:6px 10px; background:#1678c3; border-radius:4px; }
main { padding:20px 16px; }
.card { background:rgba(255,255,255,0.08); padding:16px; margin-bottom:12px; border-radius:8px; }
.card h2 { margin:0 0 8px; font-size:14px; color:#9ec5e6; }
.card .big { font-size:32px; font-weight:bold; }
.row { display:flex; gap:8px; }
button { background:#1678c3; color:#fff; border:0; padding:10px 14px; border-radius:6px; cursor:pointer; flex:1; font-weight:bold; }
button.danger { background:#d93030; }
input { width:100%; padding:10px; border:0; border-radius:6px; margin-bottom:8px; box-sizing:border-box; }
.empty { color:#9ec5e6; text-align:center; padding:40px 16px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-init.js"></script>
<script src="balance-display.js"></script>
</head>
<body>
<header><a href="index.html">← Back</a><h1 style="margin-left:10px">Account</h1></header>
<main id="account-content"><div class="empty">Loading account...</div></main>
<script>
(async function(){
  const session = (() => { try { return JSON.parse(localStorage.getItem('forzza_session')||'null'); } catch(e){ return null; } })();
  const main = document.getElementById('account-content');
  if (!session || !session.userId) {
    main.innerHTML = '<div class="empty">Please <a href="login.html" style="color:#11a7dd">log in</a> to view your account.</div>';
    return;
  }
  const { data: profile } = await window.supabase.from('profiles').select('id, username, balance, role, created_at').eq('id', session.userId).single();
  if (!profile) { main.innerHTML = '<div class="empty">Profile not found.</div>'; return; }
  main.innerHTML = `
    <div class="card">
      <h2>Username</h2>
      <div class="big">${profile.username || '-'}</div>
    </div>
    <div class="card">
      <h2>Balance</h2>
      <div class="big" style="color:#079c20">€ ${Number(profile.balance||0).toFixed(2)}</div>
    </div>
    <div class="card">
      <h2>Role</h2>
      <div>${profile.role || 'player'}</div>
    </div>
    <div class="card">
      <h2>Deposit request</h2>
      <input type="number" id="dep-amount" placeholder="Amount in EUR" min="1" />
      <button onclick="requestDeposit()">Request Deposit</button>
    </div>
    <div class="card">
      <h2>Withdraw request</h2>
      <input type="number" id="wd-amount" placeholder="Amount in EUR" min="1" />
      <button onclick="requestWithdraw()">Request Withdraw</button>
    </div>
    <div class="card">
      <button class="danger" onclick="logout()">Log out</button>
    </div>
  `;
})();

async function requestDeposit() {
  const amt = Number(document.getElementById('dep-amount').value);
  if (!isFinite(amt) || amt <= 0) return alert('Invalid amount');
  const session = JSON.parse(localStorage.getItem('forzza_session') || 'null');
  if (!session) return;
  const { error } = await window.supabase.from('transactions').insert({ user_id: session.userId, type: 'deposit', amount: amt, status: 'pending' });
  if (error) return alert('Error: ' + error.message);
  alert('Deposit request submitted. A cashier will review it.');
  document.getElementById('dep-amount').value = '';
}
async function requestWithdraw() {
  const amt = Number(document.getElementById('wd-amount').value);
  if (!isFinite(amt) || amt <= 0) return alert('Invalid amount');
  const session = JSON.parse(localStorage.getItem('forzza_session') || 'null');
  if (!session) return;
  const { error } = await window.supabase.from('transactions').insert({ user_id: session.userId, type: 'withdraw', amount: amt, status: 'pending' });
  if (error) return alert('Error: ' + error.message);
  alert('Withdrawal request submitted.');
  document.getElementById('wd-amount').value = '';
}
async function logout() {
  try { await window.supabase.auth.signOut(); } catch(e){}
  localStorage.removeItem('forzza_session');
  window.location.href = 'login.html';
}
</script>
</body>
</html>
